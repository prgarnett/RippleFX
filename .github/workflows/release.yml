name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn package -DskipTests
      - uses: softprops/action-gh-release@v1
        with:
          files: target/RippleFX-*-jar-with-dependencies.jar